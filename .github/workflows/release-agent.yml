name: Release Agent

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build & Release Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build agent (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-s -w -X github.com/proberx/agent/internal/upgrade.Version=${{ steps.version.outputs.VERSION }}" \
            -o proberx-agent_linux_amd64 \
            .

      - name: Generate checksum
        run: sha256sum proberx-agent_linux_amd64 > proberx-agent_linux_amd64.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            apps/agent/proberx-agent_linux_amd64
            apps/agent/proberx-agent_linux_amd64.sha256
